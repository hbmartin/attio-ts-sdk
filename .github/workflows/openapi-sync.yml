name: openapi-sync

on:
  schedule:
    # Run at midnight UTC daily
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Regenerate OpenAPI SDK
        run: pnpm openapi-ts

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain src/generated/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate OpenAPI SDK"
          title: "chore: regenerate OpenAPI SDK"
          body: |
            This PR was automatically generated by the OpenAPI sync workflow.

            **Changes:**
            - Regenerated SDK from https://api.attio.com/openapi/api

            **Date:** ${{ steps.date.outputs.date }}

            Please review the generated changes before merging.
          branch: heyapi-${{ steps.date.outputs.date }}
          delete-branch: true
          labels: |
            automated
            openapi
